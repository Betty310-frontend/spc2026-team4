repos:
  # 파일 기본 체크
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        files: ^backend/
      - id: end-of-file-fixer
        files: ^backend/
      - id: check-yaml
        files: ^backend/
      - id: check-added-large-files
        args: ["--maxkb=500"]
        files: ^backend/
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # Ruff: 린트 + 포맷
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # mypy: 타입 검사
  - repo: local
    hooks:
      - id: mypy
        name: mypy type check
        entry: uv run --directory backend mypy app/
        language: system
        types: [python]
        files: ^backend/app/
        pass_filenames: false
